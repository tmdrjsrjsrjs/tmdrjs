<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>연극원 입장 검표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;
  --gold:#C9A84C;
  --gold2:#E8C97A;
  --text:#F0EDE8;
  --muted:#6B6875;
  --border:#1E1C2A;
  --ok:#3DD68C;
  --ok-glow:rgba(61,214,140,0.25);
  --card:#111118;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  display:grid;grid-template-rows:auto 1fr auto;
}

/* noise texture overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  border-bottom:1px solid var(--border);
  padding:1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,15,0.95);backdrop-filter:blur(10px);
}
.logo{
  display:flex;align-items:center;gap:0.8rem;
}
.logo-mark{
  width:36px;height:36px;border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif KR',serif;font-size:1rem;color:var(--gold);
}
.logo-text{
  font-family:'Noto Serif KR',serif;
  font-size:0.95rem;color:var(--text);letter-spacing:0.05em;
}
.logo-text span{color:var(--gold);font-size:0.72rem;display:block;letter-spacing:0.15em;margin-top:1px}

.header-right{display:flex;align-items:center;gap:1.5rem}
.live-badge{
  display:flex;align-items:center;gap:0.5rem;
  font-size:0.68rem;letter-spacing:0.15em;color:var(--ok);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.clock{font-size:0.8rem;color:var(--muted);letter-spacing:0.05em;font-feature-settings:'tnum'}

/* ── MAIN GRID ── */
.main{
  position:relative;z-index:5;
  display:grid;grid-template-columns:1fr 320px;
  overflow:hidden;
}

/* ── LEFT: DISPLAY ── */
.display-area{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;border-right:1px solid var(--border);
  position:relative;overflow:hidden;
}

/* idle state */
.idle-screen{
  display:flex;flex-direction:column;align-items:center;gap:2rem;
  text-align:center;
  transition:opacity 0.3s,transform 0.3s;
}
.idle-screen.hidden{opacity:0;transform:scale(0.96);pointer-events:none;position:absolute}
.idle-icon{
  width:100px;height:100px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;color:var(--muted);
  position:relative;
}
.idle-icon::before,.idle-icon::after{
  content:'';position:absolute;
  width:12px;height:12px;
}
.idle-icon::before{top:-1px;left:-1px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.idle-icon::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}
.idle-title{font-family:'Noto Serif KR',serif;font-size:1.4rem;color:var(--muted);font-weight:400}
.idle-sub{font-size:0.82rem;color:var(--muted);line-height:1.7;opacity:0.6}

/* confirm screen */
.confirm-screen{
  display:flex;flex-direction:column;align-items:center;gap:1.5rem;
  text-align:center;
  opacity:0;transform:scale(0.9);
  pointer-events:none;position:absolute;
  transition:opacity 0.4s cubic-bezier(0.34,1.4,0.64,1),transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.confirm-screen.visible{opacity:1;transform:scale(1);pointer-events:auto;position:relative}

.confirm-ring{
  width:130px;height:130px;border-radius:50%;
  border:2px solid var(--ok);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:0 0 40px var(--ok-glow),inset 0 0 40px rgba(61,214,140,0.04);
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{box-shadow:0 0 30px var(--ok-glow),inset 0 0 30px rgba(61,214,140,0.04)}50%{box-shadow:0 0 60px var(--ok-glow),inset 0 0 40px rgba(61,214,140,0.08)}}
.confirm-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(61,214,140,0.2);
}
.confirm-check{font-size:3.5rem;line-height:1}

.confirm-title{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:700;color:var(--ok);
  letter-spacing:-0.01em;
}
.confirm-sub{
  font-size:1rem;color:var(--text);opacity:0.7;
  line-height:1.6;
}
.confirm-num{
  font-size:3.5rem;font-weight:900;color:var(--gold);
  font-feature-settings:'tnum';
  line-height:1;
}
.confirm-num-label{font-size:0.8rem;color:var(--muted);letter-spacing:0.1em;margin-top:0.3rem}

/* countdown ring */
.countdown-wrap{position:relative;width:48px;height:48px;margin-top:0.5rem}
.countdown-svg{transform:rotate(-90deg)}
.countdown-track{fill:none;stroke:var(--border);stroke-width:3}
.countdown-fill{fill:none;stroke:var(--ok);stroke-width:3;stroke-linecap:round;stroke-dasharray:138;stroke-dashoffset:0;transition:stroke-dashoffset 0.1s linear}
.countdown-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;color:var(--muted);font-feature-settings:'tnum';
}

/* ── RIGHT: STATS ── */
.stats-panel{
  display:flex;flex-direction:column;padding:1.5rem;gap:1.2rem;
  overflow-y:auto;background:var(--card);
}
.stats-panel::-webkit-scrollbar{width:3px}
.stats-panel::-webkit-scrollbar-thumb{background:var(--border)}

.stat-section-title{
  font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);padding-bottom:0.8rem;
  border-bottom:1px solid var(--border);
}

/* Big count */
.big-count-card{
  background:var(--bg);border:1px solid var(--border);
  padding:1.5rem;text-align:center;position:relative;overflow:hidden;
}
.big-count-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.big-count-label{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem}
.big-count-num{
  font-size:4rem;font-weight:900;
  color:var(--gold);line-height:1;
  font-feature-settings:'tnum';
  transition:all 0.3s;
}
.big-count-num.bump{animation:bump 0.35s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.big-count-sub{font-size:0.72rem;color:var(--muted);margin-top:0.5rem}

/* mini stats */
.mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
.mini-card{
  background:var(--bg);border:1px solid var(--border);
  padding:1rem 0.8rem;text-align:center;
}
.mini-label{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem}
.mini-val{font-size:1.5rem;font-weight:700;font-feature-settings:'tnum';color:var(--text)}

/* log */
.log-header{display:flex;justify-content:space-between;align-items:center}
.log-clear-btn{font-size:0.62rem;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:0.05em;transition:color 0.2s}
.log-clear-btn:hover{color:#ff6b6b}
.log-list{display:flex;flex-direction:column;gap:0.35rem;max-height:220px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:2px}
.log-list::-webkit-scrollbar-thumb{background:var(--border)}
.log-entry{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.55rem 0.7rem;
  background:var(--bg);border-left:2px solid var(--ok);
  animation:slideIn 0.25s ease;
  font-size:0.75rem;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.log-n{font-weight:700;color:var(--gold);min-width:28px;font-feature-settings:'tnum'}
.log-time{color:var(--muted);margin-left:auto;font-feature-settings:'tnum';font-size:0.68rem}
.log-empty{font-size:0.75rem;color:var(--muted);text-align:center;padding:1rem 0;opacity:0.6}

/* reset btn */
.reset-btn{
  width:100%;padding:0.8rem;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:inherit;font-size:0.72rem;
  letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;
  margin-top:auto;
}
.reset-btn:hover{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,0.05)}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;
  border-top:1px solid var(--border);
  padding:0.8rem 2rem;
  display:flex;align-items:center;gap:1rem;
  background:rgba(10,10,15,0.98);
}
.footer-input-wrap{flex:1;display:flex;gap:0.7rem;max-width:500px}
.barcode-input{
  flex:1;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:0.9rem;
  padding:0.7rem 1rem;outline:none;border-radius:2px;
  transition:border-color 0.2s;
}
.barcode-input:focus{border-color:var(--gold)}
.barcode-input::placeholder{color:var(--muted);font-size:0.8rem}
.scan-btn{
  background:var(--gold);color:#0A0A0F;
  font-family:inherit;font-weight:700;font-size:0.75rem;
  letter-spacing:0.1em;padding:0 1.4rem;border:none;
  border-radius:2px;cursor:pointer;white-space:nowrap;
  transition:background 0.15s,transform 0.1s;
}
.scan-btn:hover{background:var(--gold2)}
.scan-btn:active{transform:scale(0.97)}

.footer-hint{font-size:0.7rem;color:var(--muted);letter-spacing:0.05em}

/* ── CONFIRM OVERLAY (full screen for audience) ── */
.big-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(10,10,15,0.97);
  flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  text-align:center;
}
.big-overlay.show{display:flex;animation:overlayIn 0.4s cubic-bezier(0.34,1.4,0.64,1)}
@keyframes overlayIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:none}}
.big-check{font-size:6rem;animation:checkBounce 0.5s cubic-bezier(0.34,1.8,0.64,1)}
@keyframes checkBounce{from{transform:scale(0)}to{transform:scale(1)}}
.big-ok-text{
  font-family:'Noto Serif KR',serif;font-size:clamp(2.5rem,8vw,5rem);
  font-weight:700;color:var(--ok);
  text-shadow:0 0 60px var(--ok-glow);
}
.big-ok-sub{font-size:clamp(1rem,3vw,1.5rem);color:var(--text);opacity:0.7}
.big-count-display{
  font-size:clamp(1rem,2.5vw,1.2rem);color:var(--muted);
  border:1px solid var(--border);padding:0.6rem 2rem;
  letter-spacing:0.1em;margin-top:0.5rem;
}
.big-count-display strong{color:var(--gold);font-size:1.5em}

@media(max-width:700px){
  .main{grid-template-columns:1fr}
  .stats-panel{display:none}
  footer{padding:0.8rem 1rem}
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-mark">劇</div>
    <div class="logo-text">
      연극원 입장 검표
      <span>THEATER CHECK-IN</span>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Left display -->
  <div class="display-area">

    <!-- Idle -->
    <div class="idle-screen" id="idleScreen">
      <div class="idle-icon">🎭</div>
      <div>
        <div class="idle-title">티켓을 스캔해 주세요</div>
        <div class="idle-sub">바코드 리더기로 티켓을 스캔하시면<br/>입장이 확인됩니다</div>
      </div>
    </div>

    <!-- Confirm -->
    <div class="confirm-screen" id="confirmScreen">
      <div class="confirm-ring">
        <div class="confirm-check">✓</div>
      </div>
      <div class="confirm-title">입장 확인</div>
      <div class="confirm-sub">티켓이 정상 확인되었습니다<br/>공연장 안으로 입장해 주세요</div>
      <div>
        <div class="confirm-num" id="confirmNum">1</div>
        <div class="confirm-num-label">번째 관객</div>
      </div>
      <div class="countdown-wrap">
        <svg class="countdown-svg" width="48" height="48" viewBox="0 0 48 48">
          <circle class="countdown-track" cx="24" cy="24" r="22"/>
          <circle class="countdown-fill" id="countdownCircle" cx="24" cy="24" r="22"/>
        </svg>
        <div class="countdown-text" id="countdownText">3</div>
      </div>
    </div>

  </div>

  <!-- Right stats -->
  <div class="stats-panel">
    <div class="stat-section-title">실시간 현황</div>

    <div class="big-count-card">
      <div class="big-count-label">총 입장 인원</div>
      <div class="big-count-num" id="totalCount">0</div>
      <div class="big-count-sub">명 입장 완료</div>
    </div>

    <div class="mini-stats">
      <div class="mini-card">
        <div class="mini-label">오늘 공연</div>
        <div class="mini-val" id="todayCount">0</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">최근 1분</div>
        <div class="mini-val" id="recentCount">0</div>
      </div>
    </div>

    <div>
      <div class="log-header">
        <div class="stat-section-title" style="border:none;padding:0">입장 로그</div>
        <button class="log-clear-btn" id="clearLogBtn">초기화</button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty">입장 기록이 없습니다</div>
      </div>
    </div>

    <button class="reset-btn" id="resetBtn">↺ 전체 초기화</button>
  </div>

</div>

<!-- Footer -->
<footer>
  <div class="footer-input-wrap">
    <input class="barcode-input" id="barcodeInput" type="text"
      placeholder="바코드를 스캔하거나 입력 후 Enter..." autocomplete="off" autofocus/>
    <button class="scan-btn" id="scanBtn">입장 ↵</button>
  </div>
  <div class="footer-hint">리더기 스캔 시 자동 입력됩니다</div>
</footer>

<!-- Big overlay (audience facing) -->
<div class="big-overlay" id="bigOverlay">
  <div class="big-check">✓</div>
  <div class="big-ok-text">입장 확인</div>
  <div class="big-ok-sub">공연장 안으로 입장해 주세요 🎭</div>
  <div class="big-count-display">오늘 <strong id="overlayCount">1</strong>번째 관객</div>
</div>

<script>
// ── STATE ──
let totalCount = 0;
let logs = []; // {time: Date}
let countdownTimer = null;
let recentTimer = null;

// ── CLOCK ──
function updateClock(){
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(updateClock, 1000); updateClock();

// ── RECENT COUNT (last 60s) ──
setInterval(()=>{
  const now = Date.now();
  const cnt = logs.filter(l => now - l.time.getTime() < 60000).length;
  document.getElementById('recentCount').textContent = cnt;
}, 1000);

// ── SCAN ──
function handleScan(raw){
  const code = raw.trim();
  if(!code) return;

  totalCount++;
  const now = new Date();
  logs.unshift({time: now});
  if(logs.length > 500) logs.pop();

  // Update stats
  updateStats();
  renderLog();

  // Show confirm
  showConfirm(totalCount);

  // Clear input
  document.getElementById('barcodeInput').value = '';
}

function updateStats(){
  // Total
  const el = document.getElementById('totalCount');
  el.textContent = totalCount;
  el.classList.remove('bump');
  void el.offsetWidth; // reflow
  el.classList.add('bump');

  document.getElementById('todayCount').textContent = totalCount;
}

function renderLog(){
  const el = document.getElementById('logList');
  if(!logs.length){
    el.innerHTML='<div class="log-empty">입장 기록이 없습니다</div>';
    return;
  }
  el.innerHTML = logs.slice(0,50).map((l,i)=>`
    <div class="log-entry">
      <span class="log-n">#${totalCount - i}</span>
      <span style="color:var(--text);font-size:0.75rem">입장 완료</span>
      <span class="log-time">${l.time.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}</span>
    </div>`).join('');
}

// ── CONFIRM UI ──
let confirmTimeout = null;
let cdInterval = null;

function showConfirm(n){
  const idle = document.getElementById('idleScreen');
  const confirm = document.getElementById('confirmScreen');
  const overlay = document.getElementById('bigOverlay');

  idle.classList.add('hidden');
  confirm.classList.add('visible');
  document.getElementById('confirmNum').textContent = n;

  // Big overlay
  document.getElementById('overlayCount').textContent = n;
  overlay.classList.add('show');

  // Countdown
  startCountdown(3, ()=>{
    idle.classList.remove('hidden');
    confirm.classList.remove('visible');
    overlay.classList.remove('show');
    document.getElementById('barcodeInput').focus();
  });
}

function startCountdown(sec, onDone){
  clearTimeout(confirmTimeout);
  clearInterval(cdInterval);

  const circle = document.getElementById('countdownCircle');
  const text   = document.getElementById('countdownText');
  const total  = 138; // circumference r=22
  let remaining = sec;
  let elapsed = 0;
  const steps = sec * 20; // 50ms intervals

  text.textContent = remaining;
  circle.style.strokeDashoffset = 0;

  cdInterval = setInterval(()=>{
    elapsed++;
    const progress = elapsed / steps;
    circle.style.strokeDashoffset = total * progress;
    const newSec = Math.ceil(sec - progress * sec);
    if(newSec !== remaining){
      remaining = newSec;
      text.textContent = remaining > 0 ? remaining : '';
    }
    if(elapsed >= steps){
      clearInterval(cdInterval);
      onDone();
    }
  }, 50);
}

// ── EVENTS ──
document.getElementById('scanBtn').addEventListener('click', ()=>{
  handleScan(document.getElementById('barcodeInput').value);
});
document.getElementById('barcodeInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') handleScan(e.target.value);
});

// Click overlay to dismiss early
document.getElementById('bigOverlay').addEventListener('click', ()=>{
  clearInterval(cdInterval);
  document.getElementById('bigOverlay').classList.remove('show');
  document.getElementById('idleScreen').classList.remove('hidden');
  document.getElementById('confirmScreen').classList.remove('visible');
  document.getElementById('barcodeInput').focus();
});

document.getElementById('clearLogBtn').addEventListener('click', ()=>{
  logs = [];
  renderLog();
  document.getElementById('recentCount').textContent = 0;
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('모든 입장 기록과 인원수를 초기화할까요?')) return;
  totalCount = 0; logs = [];
  updateStats(); renderLog();
  document.getElementById('todayCount').textContent = 0;
  document.getElementById('recentCount').textContent = 0;
  // Reset display
  document.getElementById('idleScreen').classList.remove('hidden');
  document.getElementById('confirmScreen').classList.remove('visible');
  document.getElementById('bigOverlay').classList.remove('show');
  clearInterval(cdInterval);
});

// Keep focus on input (for barcode reader)
document.addEventListener('click', e=>{
  if(e.target.tagName !== 'BUTTON' && e.target.id !== 'barcodeInput'){
    document.getElementById('barcodeInput').focus();
  }
});
</script>
</body>
</html>
